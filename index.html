<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Anniversary Sophia Alonsabe</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #fff5e6);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      padding: 20px;
      text-align: center;
    }

    /* Confetti */
    .confetti {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      top: 0;
      left: 0;
    }

    .confetti span {
      position: absolute;
      width: 10px;
      height: 10px;
      background: red;
      animation: fall 5s linear infinite;
    }

    .confetti span:nth-child(2n) { background: gold; }
    .confetti span:nth-child(3n) { background: pink; }
    .confetti span:nth-child(4n) { background: lightblue; }

    @keyframes fall {
      0% { transform: translateY(-100px) rotate(0deg); }
      100% { transform: translateY(110vh) rotate(360deg); }
    }

    /* Poster */
    .poster {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      margin-bottom: 30px;
    }

    .poster h1 {
      color: #d63384;
      font-size: 40px;
      margin: 0;
    }

    .poster h2 {
      color: #555;
      margin-top: 10px;
    }

    .heart {
      font-size: 50px;
      animation: pulse 1s infinite;
      color: red;
      margin: 10px 0;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .gallery img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    /* Button */
    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #d63384;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <!-- Confetti -->
  <div class="confetti">
    <span style="left:10%; animation-delay:0s;"></span>
    <span style="left:20%; animation-delay:1s;"></span>
    <span style="left:30%; animation-delay:2s;"></span>
    <span style="left:40%; animation-delay:0.5s;"></span>
    <span style="left:50%; animation-delay:1.5s;"></span>
    <span style="left:60%; animation-delay:2.5s;"></span>
    <span style="left:70%; animation-delay:1.2s;"></span>
    <span style="left:80%; animation-delay:0.7s;"></span>
    <span style="left:90%; animation-delay:2.2s;"></span>
  </div>

  <div class="container">

    <!-- Poster -->
    <div class="poster">
      <h1>Happy Anniversary</h1>
      <h2>Sophia Alonsabe</h2>
      <div class="heart">❤️</div>
      <p>
        Wishing you love, happiness, and beautiful memories today and always.
      </p>
      <a href="#" class="btn">Celebrate 💖</a>
    </div>

    <!-- Gallery -->
    <div class="gallery">
      <img src="https://source.unsplash.com/800x600/?anniversary,couple,sunset" alt="Anniversary 1" />
      <img src="https://source.unsplash.com/800x600/?wedding,rings,love" alt="Anniversary 2" />
      <img src="https://source.unsplash.com/800x600/?romantic,dinner,candles" alt="Anniversary 3" />
      <img src="https://source.unsplash.com/800x600/?love,hearts,romantic" alt="Anniversary 4" />
    </div>

  </div>

</body>
</html>

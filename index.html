<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4 Image Gallery</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .container img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <h1>My 4 Image Gallery</h1>
  <div class="container">
    <img src="https://source.unsplash.com/random/800x600?nature1" alt="Image 1" />
    <img src="https://source.unsplash.com/random/800x600?nature2" alt="Image 2" />
    <img src="https://source.unsplash.com/random/800x600?nature3" alt="Image 3" />
    <img src="https://source.unsplash.com/random/800x600?nature4" alt="Image 4" />
  </div>
</body>
</html>

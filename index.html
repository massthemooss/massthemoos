<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Anniversary Sophia Alonsabe</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #fff5e6);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Confetti effect */
    .confetti {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .confetti span {
      position: absolute;
      width: 10px;
      height: 10px;
      background: red;
      animation: fall 5s linear infinite;
    }

    .confetti span:nth-child(2n) { background: gold; }
    .confetti span:nth-child(3n) { background: pink; }
    .confetti span:nth-child(4n) { background: lightblue; }

    @keyframes fall {
      0% { transform: translateY(-100px) rotate(0deg); }
      100% { transform: translateY(110vh) rotate(360deg); }
    }

    /* Poster Card */
    .poster {
      position: relative;
      z-index: 1;
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-width: 500px;
    }

    .poster h1 {
      font-size: 40px;
      color: #d63384;
      margin-bottom: 10px;
    }

    .poster h2 {
      font-size: 22px;
      color: #555;
      margin-bottom: 20px;
    }

    .poster p {
      font-size: 18px;
      color: #333;
      line-height: 1.5;
    }

    .heart {
      font-size: 50px;
      animation: pulse 1s infinite;
      color: red;
      margin: 10px 0;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
